services:
  cop-pilot-portal:
    image: ${DOCKER_REG}${DOCKER_REPO}${APP_NAME}:${DOCKER_TAG}
    container_name: ${APP_NAME}
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      TMF_BASE_URL: ${TMF_BASE_URL:-}
      TMF_API_KEY: ${TMF_API_KEY:-}
      LLM_ASSISTANT_ENDPOINT: ${LLM_ASSISTANT_ENDPOINT:-}
      LLM_ASSISTANT_API_KEY: ${LLM_ASSISTANT_API_KEY:-}
      SQLITE_DB_PATH: /data/sqlite.db
      NODE_ENV: production
    ports:
      - "3000:3000"
    volumes:
      - sqlite-data:/data
    labels:
      io.portainer.accesscontrol.teams: coppilot-all
    restart: unless-stopped

volumes:
  sqlite-data:
